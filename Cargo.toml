bcode_plugin_sdk                        = { version = "0.0.1-alpha.0", default-features = false, path = "packages/plugin-sdk" }
bcode_provider_auth                     = { version = "0.0.1-alpha.0", default-features = false, path = "packages/provider-auth" }
bcode_server                            = { version = "0.0.1-alpha.0", default-features = false, path = "packages/server" }
bcode_session                           = { version = "0.0.1-alpha.0", default-features = false, path = "packages/session" }
bcode_session_import                    = { version = "0.0.1-alpha.0", default-features = false, path = "packages/session-import" }

bcode_blims_plugin                      = { version = "0.0.1-alpha.0", default-features = false, path = "plugins/blims-plugin" }
bcode_cli                               = { version = "0.0.1-alpha.0", default-features = false, path = "packages/cli" }
bcode_client                            = { version = "0.0.1-alpha.0", default-features = false, path = "packages/client" }
bcode_code_review_models                = { version = "0.0.1-alpha.0", default-features = false, path = "packages/code-review/models" }
bcode_code_review_plugin                = { version = "0.0.1-alpha.0", default-features = false, path = "plugins/code-review-plugin" }
bcode_command                           = { version = "0.0.1-alpha.0", default-features = false, path = "packages/command" }
bcode_config                            = { version = "0.0.1-alpha.0", default-features = false, path = "packages/config" }
bcode_daemon_lifecycle                  = { version = "0.0.1-alpha.0", default-features = false, path = "packages/daemon-lifecycle" }
bcode_default_agents_plugin             = { version = "0.0.1-alpha.0", default-features = false, path = "plugins/default-agents-plugin" }
bcode_document_plugin                   = { version = "0.0.1-alpha.0", default-features = false, path = "plugins/document-plugin" }

# BMUX reuse
bmux_codec          = { default-features = false, git = "https://github.com/BSteffaniak/bmux.git", branch = "master" }
bmux_ipc            = { default-features = false, git = "https://github.com/BSteffaniak/bmux.git", branch = "master" }
bmux_keyboard       = { default-features = false, git = "https://github.com/BSteffaniak/bmux.git", branch = "master" }
bmux_terminal_grid  = { default-features = false, git = "https://github.com/BSteffaniak/bmux.git", branch = "master" }
bmux_text_edit      = { default-features = false, git = "https://github.com/BSteffaniak/bmux.git", branch = "master" }
bmux_tui            = { default-features = false, git = "https://github.com/BSteffaniak/bmux.git", branch = "master" }
bmux_tui_components = { default-features = false, git = "https://github.com/BSteffaniak/bmux.git", branch = "master" }

# External dependencies
arboard = { version = "3.6.1", default-features = false, features = [
    "image-data",
] }
aws-config = { version = "1.8.16", default-features = false, features = [
    "credentials-process",
    "rt-tokio",
    "rustls",
    "sso",
] }
aws-credential-types = { version = "1.2.14", default-features = false }
aws-sdk-bedrock = { version = "1.141.0", default-features = false, features = [
    "rt-tokio",
    "rustls",
] }
aws-sdk-bedrockruntime = { version = "1.130.0", default-features = false, features = [
    "rt-tokio",
    "rustls",
] }
aws-smithy-types = { version = "1.4.7", default-features = false }
base64 = { version = "0.22.1", default-features = false, features = ["std"] }
clap = { version = "4.5.40", default-features = false }
crossterm = { version = "0.29.0", default-features = false }
git2 = { version = "0.20.3", default-features = false }
globset = { version = "0.4.18", default-features = false }
hyperchad_color = { git = "https://github.com/MoosicBox/MoosicBox.git", branch = "master", default-features = false }
hyperchad_markdown = { git = "https://github.com/MoosicBox/MoosicBox.git", branch = "master", default-features = false, features = [
    "xss-protection",
] }
hyperchad_transformer = { git = "https://github.com/MoosicBox/MoosicBox.git", branch = "master", default-features = false }
hyperchad_transformer_models = { git = "https://github.com/MoosicBox/MoosicBox.git", branch = "master", default-features = false }
image = { version = "0.25.10", default-features = false, features = [
    "gif",
    "jpeg",
    "png",
    "webp",
] }
libloading = { version = "0.9.0", default-features = false }
pdf-extract = { version = "0.10.0", default-features = false }
png = { version = "0.18.1", default-features = false }
portable-pty = { version = "0.9.0", default-features = false }
rand = { version = "0.9.4", default-features = false, features = [
    "os_rng",
    "std",
] }
reqwest = { version = "0.12.24", default-features = false, features = [
    "json",
    "rustls-tls",
] }
rpassword = { version = "7.4.0", default-features = false }
rusqlite = { version = "=0.32.1", default-features = false, features = [
    "bundled",
] }
semver = { version = "1.0.28", default-features = false, features = ["std"] }
serde = { version = "1.0.219", default-features = false, features = ["std"] }
serde_json = { version = "1.0.149", default-features = false, features = [
    "std",
] }
sha2 = { version = "0.10.9", default-features = false }
sshenv_vault = { git = "https://github.com/BSteffaniak/sshenv.git", rev = "87973bb7681c68cb9c787931b0ab402468adb517", default-features = false }
switchy = { git = "https://github.com/MoosicBox/MoosicBox.git", branch = "master", default-features = false }
switchy_database = { git = "https://github.com/MoosicBox/MoosicBox.git", branch = "master", default-features = false, features = [
    "schema",
    "sqlite-rusqlite",
] }
switchy_database_connection = { git = "https://github.com/MoosicBox/MoosicBox.git", branch = "master", default-features = false, features = [
    "sqlite-rusqlite",
] }
syntect = { version = "5.3.0", default-features = false, features = [
    "default-syntaxes",
    "default-themes",
    "parsing",
    "regex-onig",
] }
tempfile = { version = "3.27.0", default-features = false }
test-log = { version = "0.2.20", default-features = false }
thiserror = { version = "2.0.12", default-features = false }
tokio = { version = "1.45.1", default-features = false }
toml = { version = "1.1.2", default-features = false, features = [
    "parse",
    "serde",
    "std",
] }
tracing = { version = "0.1.44", default-features = false, features = ["std"] }
tracing-subscriber = { version = "0.3.23", default-features = false, features = [
    "ansi",
    "env-filter",
    "fmt",
    "std",
] }
unicode-segmentation = { version = "1.13.0", default-features = false }
unicode-width = { version = "0.2.2", default-features = false }
uuid = { version = "1.21.0", default-features = false }
worktree_setup_config = { version = "0.4.0", default-features = false }
worktree_setup_git = { version = "0.4.0", default-features = false }
worktree_setup_operations = { version = "0.4.0", default-features = false }
zeroize = { version = "1.8.2", default-features = false, features = ["std"] }

[profile.release]
codegen-units = 1
lto           = false
opt-level     = 3
strip         = "symbols"

[profile.debug-release]
debug    = true
inherits = "release"
strip    = "none"

[profile.release-lto]
inherits = "release"
lto      = "fat"

[profile.release-lto-no-panic]
inherits = "release-lto"
panic    = "abort"

[profile.small]
inherits  = "release-lto-no-panic"
opt-level = "z"

[profile.fast]
inherits  = "dev"
opt-level = 0


name = "models-catalog"
main = "src/worker.js"
compatibility_date = "2025-12-01"
[observability]
enabled = true

[assets]
directory = "../../dist"
binding = "ASSETS"

[[r2_buckets]]
binding = "LIVE_SNAPSHOTS"
bucket_name = "models-catalog-live"

[vars]
DYNAMIC_PROVIDERS = "bedrock"
BEDROCK_DISCOVERY_REGIONS = "us-east-1,us-west-2"
LIVE_FRESH_FOR_SECONDS = "900"
LIVE_MAX_STALE_SECONDS = "21600"
LIVE_REFRESH_LOCK_SECONDS = "120"
LIVE_REFRESH_FAILURE_COOLDOWN_SECONDS = "300"
LIVE_WRITE_HISTORY = "false"

[env.preview]
name = "models-catalog-preview"

[[env.preview.r2_buckets]]
binding = "LIVE_SNAPSHOTS"
bucket_name = "models-catalog-live-preview"

[env.preview.vars]
DYNAMIC_PROVIDERS = "bedrock"
BEDROCK_DISCOVERY_REGIONS = "us-east-1"
LIVE_FRESH_FOR_SECONDS = "900"
LIVE_MAX_STALE_SECONDS = "21600"
LIVE_REFRESH_LOCK_SECONDS = "120"
LIVE_REFRESH_FAILURE_COOLDOWN_SECONDS = "300"
LIVE_WRITE_HISTORY = "false"

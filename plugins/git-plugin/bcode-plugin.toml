id      = "bcode.git"
name    = "Bcode Git Plugin"
version = "0.0.1"

[[services]]
class        = "tool_execution"
description  = "Model-callable Git repository access tools"
interface_id = "bcode.tool/v1"
name         = "Git Tools"

[[visual_adapters]]
artifact_schema    = "bcode.git.clone_request"
id                 = "git-clone-request-card"
max_schema_version = 1
min_schema_version = 1
priority           = 100
producer_default   = true
render_mode        = "transcript_block"
surfaces           = ["tui"]

[[visual_adapters]]
artifact_schema    = "bcode.git.clone_result"
id                 = "git-clone-result-card"
max_schema_version = 1
min_schema_version = 1
priority           = 100
producer_default   = true
render_mode        = "transcript_block"
surfaces           = ["tui"]

[concurrency]
max  = 2
type = "limited"

[runtime]
abi_version  = 2
event_symbol = "bcode_plugin_handle_event_v1"
library      = "libbcode_git_plugin.dylib"
type         = "native"

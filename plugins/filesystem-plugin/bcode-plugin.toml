id      = "bcode.filesystem"
name    = "Bcode Filesystem Plugin"
version = "0.0.1"

[[services]]
description  = "Filesystem read/write utility service"
interface_id = "bcode.filesystem/v1"
name         = "Filesystem"

[[services]]
class        = "tool_execution"
description  = "Model-callable filesystem tools"
interface_id = "bcode.tool/v1"
name         = "Filesystem Tools"

[[visual_adapters]]
id                   = "filesystem-change-card"
max_schema_version   = 1
min_schema_version   = 1
operation            = "present_artifact"
priority             = 100
producer_default     = true
schema               = "bcode.filesystem.change"
service_interface_id = "bcode.tool/v1"
surfaces             = ["tui", "web", "generic-component"]

[[visual_adapters]]
id                   = "filesystem-file-change-view"
max_schema_version   = 1
min_schema_version   = 1
operation            = "present_view"
priority             = 100
producer_default     = true
schema               = "bcode.filesystem.file_change"
service_interface_id = "bcode.tool/v1"
surfaces             = ["tui", "web", "generic-component"]

[concurrency]
max  = 4
type = "limited"

[runtime]
abi_version    = 1
event_symbol   = "bcode_plugin_handle_event_v1"
library        = "libbcode_filesystem_plugin.dylib"
service_symbol = "bcode_plugin_invoke_service_v1"
type           = "native"

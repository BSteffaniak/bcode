id      = "bcode.filesystem"
name    = "Bcode Filesystem Plugin"
version = "0.0.1"

[[services]]
description  = "Filesystem read/write utility service"
interface_id = "bcode.filesystem/v1"
name         = "Filesystem"

[[services]]
class        = "tool_execution"
description  = "Model-callable filesystem tools"
interface_id = "bcode.tool/v1"
name         = "Filesystem Tools"

[[visual_adapters]]
artifact_schema    = "bcode.filesystem.change"
id                 = "filesystem-change-card"
max_schema_version = 1
min_schema_version = 1
priority           = 100
producer_default   = true
render_mode        = "transcript_block"
surfaces           = ["tui"]

[[visual_adapters]]
artifact_schema    = "bcode.filesystem.request"
id                 = "filesystem-request-card"
max_schema_version = 1
min_schema_version = 1
priority           = 100
producer_default   = true
render_mode        = "transcript_block"
surfaces           = ["tui"]

[[visual_adapters]]
artifact_schema    = "bcode.filesystem.read"
id                 = "filesystem-read-card"
max_schema_version = 1
min_schema_version = 1
priority           = 100
producer_default   = true
render_mode        = "transcript_block"
surfaces           = ["tui"]

[[visual_adapters]]

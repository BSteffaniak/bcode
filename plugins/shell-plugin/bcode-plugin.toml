id      = "bcode.shell"
name    = "Bcode Shell Plugin"
version = "0.0.1"

[[services]]
class        = "tool_execution"
description  = "Permissioned model-callable shell execution tools"
interface_id = "bcode.tool/v1"
name         = "Shell Tools"

[[visual_adapters]]
artifact_schema    = "bcode.tool.request.shell.run"
id                 = "shell-run-request-card"
max_schema_version = 1
min_schema_version = 1
priority           = 100
producer_default   = true
render_mode        = "full_block"
surfaces           = ["tui"]

[[visual_adapters]]
artifact_schema    = "bcode.shell.run"
id                 = "shell-run-terminal-card"
max_schema_version = 1
min_schema_version = 1
priority           = 100
producer_default   = true
render_mode        = "full_block"
surfaces           = ["tui"]

[concurrency]
type = "concurrent"

[runtime]
abi_version    = 1
event_symbol   = "bcode_plugin_handle_event_v1"
library        = "libbcode_shell_plugin.dylib"
service_symbol = "bcode_plugin_invoke_service_v1"
type           = "native"

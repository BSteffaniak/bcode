id      = "bcode.bedrock"
name    = "Bcode Bedrock Provider"
version = "0.0.1"

[[services]]
description  = "Amazon Bedrock ConverseStream model provider"
interface_id = "bcode.model-provider/v1"
name         = "Amazon Bedrock Model Provider"

[concurrency]
type = "concurrent"

[runtime]
abi_version    = 1
event_symbol   = "bcode_plugin_handle_event_v1"
library        = "libbcode_bedrock_provider_plugin.dylib"
service_symbol = "bcode_plugin_invoke_service_v1"
type           = "native"

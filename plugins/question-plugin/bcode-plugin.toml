id      = "bcode.question"
name    = "Bcode Question Tool"
version = "0.0.1"

[[services]]
description  = "Interactive read-only question/ask tool"
interface_id = "bcode.tool/v1"
name         = "Question Tool"

[[visual_adapters]]
artifact_schema    = "bcode.question.outcome"
id                 = "question-outcome-component"
max_schema_version = 1
min_schema_version = 1
priority           = 100
producer_default   = true
surfaces           = ["tui"]

[[tui_surfaces]]
description = "Inline interactive question surface"
kind        = "bcode.question.inline"
title       = "Question"

[runtime]
abi_version  = 2
event_symbol = "bcode_plugin_handle_event_v1"
library      = "libbcode_question_plugin.dylib"
type         = "native"

id      = "bcode.worktree"
name    = "Bcode Worktree Plugin"
version = "0.0.1"

[[services]]
class        = "tool_execution"
description  = "Model-callable Git worktree tools"
interface_id = "bcode.tool/v1"
name         = "Worktree Tools"

[[command_contributions]]
category    = "worktree"
description = "List Git worktrees for the current repository"
id          = "worktree.list"
title       = "List Worktrees"

[[command_contributions]]
category    = "worktree"
description = "Create a worktree for the current session"
id          = "worktree.createSession"
title       = "Create Session Worktree"

[[command_contributions]]
category    = "worktree"
description = "Attach current session to an existing worktree"
id          = "worktree.attach"
title       = "Attach Worktree"

[[command_contributions]]
category    = "worktree"
description = "Remove a Git worktree"
id          = "worktree.remove"
title       = "Remove Worktree"

[concurrency]
max  = 2
type = "limited"

[runtime]
abi_version    = 1
event_symbol   = "bcode_plugin_handle_event_v1"
library        = "libbcode_worktree_plugin.dylib"
service_symbol = "bcode_plugin_invoke_service_v1"
type           = "native"

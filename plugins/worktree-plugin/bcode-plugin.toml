id      = "bcode.worktree"
name    = "Bcode Worktree Plugin"
version = "0.0.1"

[[services]]
class        = "tool_execution"
description  = "Model-callable Git worktree tools"
interface_id = "bcode.tool/v1"
name         = "Worktree Tools"

[[tui_surfaces]]
description = "Plugin-owned worktree attach UI"
kind        = "command.work-tree.attach"
title       = "Attach Worktree"

[[tui_surfaces]]
description = "Plugin-owned worktree creation UI"
kind        = "command.work-tree.createSession"
title       = "Create Worktree Session"

[[tui_surfaces]]
description = "Plugin-owned worktree removal UI"
kind        = "command.work-tree.remove"
title       = "Remove Worktree"

[[visual_adapters]]
artifact_schema    = "bcode.worktree.request"
id                 = "worktree-request-card"
max_schema_version = 1
min_schema_version = 1
priority           = 100
producer_default   = true
render_mode        = "transcript_block"
surfaces           = ["tui"]

[[visual_adapters]]
artifact_schema    = "bcode.worktree.list"
id                 = "worktree-list-card"
max_schema_version = 1
min_schema_version = 1
priority           = 100
producer_default   = true
render_mode        = "transcript_block"
surfaces           = ["tui"]

[[visual_adapters]]
artifact_schema    = "bcode.worktree.create_result"
id                 = "worktree-create-result-card"
max_schema_version = 1
min_schema_version = 1
priority           = 100
producer_default   = true
render_mode        = "transcript_block"
surfaces           = ["tui"]

[[visual_adapters]]
artifact_schema    = "bcode.worktree.remove_result"
id                 = "worktree-remove-result-card"
max_schema_version = 1
min_schema_version = 1
priority           = 100
producer_default   = true
render_mode        = "transcript_block"
surfaces           = ["tui"]

[concurrency]
max  = 2
type = "limited"

[runtime]
abi_version  = 2
event_symbol = "bcode_plugin_handle_event_v1"
library      = "libbcode_worktree_plugin.dylib"
type         = "native"

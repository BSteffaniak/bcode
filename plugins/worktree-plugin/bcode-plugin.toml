id      = "bcode.worktree"
name    = "Bcode Worktree Plugin"
version = "0.0.1"

[[services]]
class        = "tool_execution"
description  = "Model-callable Git worktree tools"
interface_id = "bcode.tool/v1"
name         = "Worktree Tools"

[[tui_surfaces]]
description = "Plugin-owned worktree attach UI"
kind        = "command.work-tree.attach"
title       = "Attach Worktree"

[[tui_surfaces]]
description = "Plugin-owned worktree creation UI"
kind        = "command.work-tree.createSession"
title       = "Create Worktree Session"

[[tui_surfaces]]
description = "Plugin-owned worktree removal UI"
kind        = "command.work-tree.remove"
title       = "Remove Worktree"

[concurrency]
max  = 2
type = "limited"

[runtime]
abi_version    = 1
event_symbol   = "bcode_plugin_handle_event_v1"
library        = "libbcode_worktree_plugin.dylib"
service_symbol = "bcode_plugin_invoke_service_v1"
type           = "native"

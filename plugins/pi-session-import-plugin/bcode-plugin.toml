id      = "bcode.pi-session-import"
name    = "Bcode Pi Session Import Plugin"
version = "0.0.1"

[[services]]
class        = "query"
description  = "Discover and load Pi sessions for one-time import into Bcode"
interface_id = "bcode.session_import/v1"
name         = "Pi Session Import"

[concurrency]
max  = 2
type = "limited"

[runtime]
abi_version = 2
library     = "libbcode_pi_session_import_plugin.dylib"
type        = "native"

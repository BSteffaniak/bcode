id      = "bcode.github"
name    = "Bcode GitHub Plugin"
version = "0.0.1"

[[services]]
class        = "tool_execution"
description  = "Model-callable GitHub repository access tools"
interface_id = "bcode.tool/v1"
name         = "GitHub Tools"

[concurrency]
max  = 2
type = "limited"

[runtime]
abi_version    = 1
event_symbol   = "bcode_plugin_handle_event_v1"
library        = "libbcode_github_plugin.dylib"
service_symbol = "bcode_plugin_invoke_service_v1"
type           = "native"

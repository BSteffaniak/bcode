id      = "bcode.default-agents"
name    = "Bcode Default Agents"
version = "0.0.1"

[[services]]
description  = "Default plan/build agent profiles and policy evaluation"
interface_id = "bcode.agent-profile/v1"
name         = "Default Agents"

[agent_defaults]
build_tools = [
    "shell.run",
    "filesystem.read",
    "filesystem.exists",
    "filesystem.list",
    "filesystem.find",
    "filesystem.grep",
    "filesystem.stat",
    "filesystem.write",
    "filesystem.edit",
    "vim_edit.preview",
    "vim_edit.apply",
    "web.search",
    "web.fetch",
    "web.status",
    "web.inspect",
    "git.clone",
    "github.clone",
    "worktree.list",
    "worktree.create",
    "worktree.remove",
    "document.extract",
    "ocr.extract",
    "ocr.status",
    "question",
    "ask",
]
plan_disabled_tools = ["filesystem.write", "filesystem.edit"]

[runtime]
abi_version    = 1
event_symbol   = "bcode_plugin_handle_event_v1"
library        = "libbcode_default_agents_plugin.dylib"
service_symbol = "bcode_plugin_invoke_service_v1"
type           = "native"

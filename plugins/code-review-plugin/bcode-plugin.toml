id      = "bcode.code_review"
name    = "Bcode Code Review Plugin"
version = "0.0.1"

[config]
section = "code_review"

categories = ["review"]

[[services]]
class        = "service"
description  = "Local Git code review services"
interface_id = "bcode.code_review/v1"
name         = "Code Review"

[[tui_surfaces]]
description = "Full-screen local Git code review home/picker UI"
kind        = "code-review-home"
title       = "Code Review Home"

[[tui_surfaces]]
description = "Full-screen local Git code review UI"
kind        = "code-review"
title       = "Code Review"

[concurrency]
max  = 2
type = "limited"

[runtime]
abi_version  = 2
event_symbol = "bcode_plugin_handle_event_v1"
library      = "libbcode_code_review_plugin.dylib"
type         = "native"

id      = "bcode.opencode-session-import"
name    = "Bcode OpenCode Session Import Plugin"
version = "0.0.1"

[[services]]
class        = "query"
description  = "Discover and load OpenCode sessions for one-time import into Bcode"
interface_id = "bcode.session_import/v1"
name         = "OpenCode Session Import"

[concurrency]
max  = 2
type = "limited"

[runtime]
abi_version = 2
library     = "libbcode_opencode_session_import_plugin.dylib"
type        = "native"

schema_version = 1
id = "edit-tools"
name = "Edit Tool Comparison"
description = "Compare editing strategies on deterministic Rust code-editing tasks."

[run]
repetitions = 1
timeout_ms = 120000
isolation = "temp_copy"
randomize_case_order = false
fail_fast = false

[environment]
capture_git = true
capture_bcode_version = true
capture_tool_versions = true

[score]
correctness = 0.70
efficiency = 0.15
speed = 0.10
cost = 0.0
stability = 0.05
correctness_required = true

[[score.metrics]]
metric = "diff_bytes"
direction = "lower_is_better"
weight = 1
target = 50000

[[score.metrics]]
metric = "wall_time_ms"
direction = "lower_is_better"
weight = 1
target = 60000

[regression]
min_pass_rate = 0.95
max_token_increase_percent = 15.0
max_latency_increase_percent = 25.0
fail_on_new_failure = true

[[variants]]
id = "filesystem-command"
name = "Filesystem command edit"
executor = "command"
allowed_tools = ["filesystem_edit"]
command = "python3 $BCODE_EVAL_SUITE_DIR/edit_adapter.py"

[[variants]]
id = "perl-command"
name = "Perl command edit"
executor = "command"
allowed_tools = ["shell_run"]
command = "python3 $BCODE_EVAL_SUITE_DIR/edit_adapter.py"

[[cases]]
id = "one-line"
name = "Surgical one-line edit"
fixture = "cases/one-line/input"
prompt = "Change TIMEOUT_MS from 1000 to 1500."
timeout_ms = 60000

[[cases.judges]]
type = "exact_diff"
expected_patch = "cases/one-line/expected.patch"
required = true

[[cases.judges]]
type = "command"
command = "cargo test --quiet"
expected_exit_code = 0
required = true


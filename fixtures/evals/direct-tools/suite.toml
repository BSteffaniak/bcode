schema_version = 1
id = "direct-tools"
name = "Direct Tool Smoke"
description = "Measure model-callable tools directly, independent of model/tool-choice behavior."

[run]
repetitions = 1
timeout_ms = 60000
isolation = "temp_copy"
randomize_case_order = false
fail_fast = false

[score]
correctness = 0.8
efficiency = 0.1
speed = 0.1
cost = 0.0
stability = 0.0
correctness_required = true

[[variants]]
id = "direct-tool"
name = "Direct tool invocation"
executor = "direct_tool"

[[cases]]
id = "filesystem-read"
name = "Direct filesystem read"
fixture = "cases/basic/input"
prompt = "Read README.md without involving a model."
timeout_ms = 30000

[cases.direct_tool]
tool_name = "filesystem.read"
arguments = { path = "README.md", limit = 5 }

[[cases.judges]]
type = "metric_threshold"
metric = "direct_tool_response_bytes"
min = 1
required = true

[[cases.judges]]
type = "regex"
target = "diff"
pattern = "diff --git"
should_match = false
required = true

[[cases]]
id = "vim-preview"
name = "Direct vim edit preview"
fixture = "cases/basic/input"
prompt = "Preview changing beta to BETA without modifying the file."
timeout_ms = 30000

[cases.direct_tool]
tool_name = "vim_edit.preview"
arguments = { path = "example.txt", steps = [{ keys = "/beta<CR>ciwBETA<Esc>" }] }

[[cases.judges]]
type = "metric_threshold"
metric = "direct_tool_response_bytes"
min = 1
required = true

[[cases.judges]]
type = "regex"
target = "diff"
pattern = "BETA"
should_match = false
required = true

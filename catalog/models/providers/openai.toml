provider_id = "openai"
display_name = "OpenAI"
kind = "open_ai_compatible"
website_url = "https://openai.com"
default_model_id = "gpt-4.1-mini"
default_codex_model_id = "gpt-5.6-sol"
fallback_model_ids = [
  "gpt-5.6-sol",
  "gpt-5.6-terra",
  "gpt-5.5",
  "gpt-5.4",
  "gpt-5.4-mini",
  "gpt-5.3-codex-spark",
]

[defaults]
context_window = 128000
max_output_tokens = 16384

[defaults.capabilities]
text_input = true
text_output = true
tool_use = true
structured_outputs = true
prompt_cache = true

[[error_handling.recoverable_error_patterns]]
id = "bcode.openai-compatible.server-overloaded"
enabled_by_default = true

[error_handling.recoverable_error_patterns.scope]
provider_plugin_id = "bcode.openai-compatible"

[error_handling.recoverable_error_patterns.match]
category = "overloaded"
code = "server_is_overloaded"

[[error_handling.recoverable_error_patterns]]
id = "bcode.openai-compatible.server-error"
enabled_by_default = true

[error_handling.recoverable_error_patterns.scope]
provider_plugin_id = "bcode.openai-compatible"

[error_handling.recoverable_error_patterns.match]
code = "server_error"

[[error_handling.recoverable_error_patterns]]
id = "bcode.openai-compatible.unsupported-content-type"
enabled_by_default = true

[error_handling.recoverable_error_patterns.scope]
provider_plugin_id = "bcode.openai-compatible"

[error_handling.recoverable_error_patterns.match]
code = "http_400"
message_contains = "Unsupported content type"


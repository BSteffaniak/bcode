name: Architecture Guards

on:
  pull_request:
  push:
    branches: [master]

jobs:
  model-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install architecture guard dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Check model catalog architecture
        run: scripts/check-model-catalog-architecture.sh

name: Deploy Models Site

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/models-site-deploy.yml"
      - "workers/models-catalog/**"
      - "packages/model-catalog/**"
      - "packages/model-catalog/models/**"
      - "packages/model-discovery/**"
      - "packages/models-site/**"
      - "packages/models-site/ui/**"
      - "catalog/models/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate model catalog
        run: cargo run --release -p bcode_model_catalog -- validate

      - name: Build catalog artifacts
        run: cargo run --release -p bcode_model_catalog -- build --output dist/v1

      - name: Build static models site
        run: cargo run --release -p bcode_models_site -- --output dist

      - name: Check Worker syntax
        run: node --check workers/models-catalog/src/worker.js

      - name: Install Wrangler
        run: npm install --global wrangler

      - name: Configure production Worker secrets
        if: ${{ github.event.inputs.environment != 'preview' }}
        working-directory: workers/models-catalog
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          INTERNAL_REFRESH_TOKEN: ${{ secrets.INTERNAL_REFRESH_TOKEN }}
        run: |
          printf '%s' "$AWS_ACCESS_KEY_ID" | wrangler secret put AWS_ACCESS_KEY_ID
          printf '%s' "$AWS_SECRET_ACCESS_KEY" | wrangler secret put AWS_SECRET_ACCESS_KEY
          if [ -n "$AWS_SESSION_TOKEN" ]; then
            printf '%s' "$AWS_SESSION_TOKEN" | wrangler secret put AWS_SESSION_TOKEN
          fi
          if [ -n "$INTERNAL_REFRESH_TOKEN" ]; then
            printf '%s' "$INTERNAL_REFRESH_TOKEN" | wrangler secret put INTERNAL_REFRESH_TOKEN
          fi

      - name: Configure preview Worker secrets
        if: ${{ github.event.inputs.environment == 'preview' }}
        working-directory: workers/models-catalog
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          INTERNAL_REFRESH_TOKEN: ${{ secrets.INTERNAL_REFRESH_TOKEN }}
        run: |
          printf '%s' "$AWS_ACCESS_KEY_ID" | wrangler secret put AWS_ACCESS_KEY_ID --env preview
          printf '%s' "$AWS_SECRET_ACCESS_KEY" | wrangler secret put AWS_SECRET_ACCESS_KEY --env preview
          if [ -n "$AWS_SESSION_TOKEN" ]; then
            printf '%s' "$AWS_SESSION_TOKEN" | wrangler secret put AWS_SESSION_TOKEN --env preview
          fi
          if [ -n "$INTERNAL_REFRESH_TOKEN" ]; then
            printf '%s' "$INTERNAL_REFRESH_TOKEN" | wrangler secret put INTERNAL_REFRESH_TOKEN --env preview
          fi

      - name: Deploy production Worker and assets
        if: ${{ github.event.inputs.environment != 'preview' }}
        working-directory: workers/models-catalog
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy

      - name: Deploy preview Worker and assets
        if: ${{ github.event.inputs.environment == 'preview' }}
        working-directory: workers/models-catalog
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --env preview

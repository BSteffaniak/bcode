[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Host-side plugin loading and discovery for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "plugin"]
license     = { workspace = true }
name        = "bcode_plugin"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bcode_command    = { workspace = true }
bcode_metrics    = { workspace = true }
bcode_plugin_sdk = { workspace = true }
bcode_tool       = { workspace = true }
bmux_plugin      = { workspace = true }
bmux_plugin_sdk  = { workspace = true }
clap             = { workspace = true, features = ["std"] }
libloading       = { workspace = true }
semver           = { workspace = true, features = ["serde"] }
serde            = { workspace = true, features = ["derive", "std"] }
serde_json       = { workspace = true }
thiserror        = { workspace = true, features = ["std"] }
tokio            = { workspace = true, features = ["macros", "rt", "sync", "time"] }
toml             = { workspace = true }
tracing          = { workspace = true }

[dev-dependencies]
bcode_hello_plugin = { workspace = true }
tokio              = { workspace = true, features = ["macros", "rt", "time"] }

[features]
default          = []
fail-on-warnings = []

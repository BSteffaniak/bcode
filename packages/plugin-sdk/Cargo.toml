[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Plugin author SDK for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "plugin", "sdk"]
license     = { workspace = true }
name        = "bcode_plugin_sdk"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bcode_command        = { workspace = true }
bcode_session_models = { workspace = true }
bcode_tool           = { workspace = true }
bmux_tui             = { workspace = true, optional = true }
clap                 = { workspace = true, features = ["std"] }
serde                = { workspace = true, features = ["derive", "std"] }
serde_json           = { workspace = true }
tokio                = { workspace = true, features = ["rt", "sync"], optional = true }

[features]
default          = []
fail-on-warnings = []
tui              = ["dep:bmux_tui", "dep:tokio"]

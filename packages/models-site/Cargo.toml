[package]
authors     = { workspace = true }
build       = "build.rs"
categories  = ["web-programming"]
description = "Bcode models catalog website"
edition     = { workspace = true }
keywords    = ["bcode", "models", "catalog", "site"]
license     = { workspace = true }
name        = "bcode_models_site"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[lib]
test = false

[[bin]]
name = "bcode-models-site"
path = "src/main.rs"
test = false

[dependencies]
bcode_model_catalog = { workspace = true }
bcode_model_catalog_models = { workspace = true }
bcode_models_site_ui = { workspace = true }
hyperchad = { workspace = true, features = [
    "app",
    "color",
    "json",
    "renderer",
    "router",
] }
serde_json = { workspace = true }
switchy = { workspace = true, features = ["async", "async-tokio"] }
[features]
actix            = ["hyperchad/renderer-html-actix"]
assets           = ["hyperchad/renderer-assets"]
default          = ["actix", "html", "assets", "static-routes"]
fail-on-warnings = ["bcode_models_site_ui/fail-on-warnings"]
html             = ["hyperchad/renderer-html"]
static-routes    = ["hyperchad/router-static-routes"]

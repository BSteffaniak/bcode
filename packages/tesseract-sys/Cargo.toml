[package]
authors     = { workspace = true }
categories  = ["external-ffi-bindings"]
description = "Raw Tesseract C API bindings and linker integration for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "ocr", "tesseract", "ffi"]
license     = { workspace = true }
links       = "tesseract"
name        = "bcode_tesseract_sys"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[build-dependencies]
cmake      = { workspace = true }
pkg-config = { workspace = true }
reqwest    = { workspace = true, features = ["blocking"], optional = true }
sha2       = { workspace = true, features = ["std"], optional = true }
toml       = { workspace = true }
zip        = { workspace = true, optional = true }

[features]
bundled-tesseract         = ["bundled-tesseract-default"]
bundled-tesseract-all     = ["bundled-tesseract-v5-3-4", "bundled-tesseract-v5-5-1"]
bundled-tesseract-default = ["bundled-tesseract-v5-5-1"]
bundled-tesseract-latest  = ["bundled-tesseract-v5-5-1"]
bundled-tesseract-v5-3-4  = ["dep:reqwest", "dep:sha2", "dep:zip"]
bundled-tesseract-v5-5-1  = ["dep:reqwest", "dep:sha2", "dep:zip"]
default                   = []
fail-on-warnings          = []
system-tesseract          = []

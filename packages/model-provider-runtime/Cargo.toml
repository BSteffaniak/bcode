[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Reusable model provider plugin turn runtime for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "model", "provider", "runtime"]
license     = { workspace = true }
name        = "bcode_model_provider_runtime"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bcode_model          = { workspace = true }
bcode_session_models = { workspace = true }
httpdate             = { workspace = true }
serde                = { workspace = true }
serde_json           = { workspace = true }
tokio                = { workspace = true, features = ["net", "rt", "sync", "time"] }

[dev-dependencies]
bcode_fake_provider_plugin = { workspace = true, features = ["static-bundled"] }
bcode_plugin_sdk           = { workspace = true }

[features]
default          = []
fail-on-warnings = []

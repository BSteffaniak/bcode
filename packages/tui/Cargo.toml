[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Terminal user interface for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "tui"]
license     = { workspace = true }
name        = "bcode_tui"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bcode_client = { workspace = true }
bcode_command = { workspace = true }
bcode_config = { workspace = true }
bcode_ipc = { workspace = true }
bcode_model = { workspace = true }
bcode_session_models = { workspace = true }
crossterm = { workspace = true, features = ["bracketed-paste", "events"] }
ratatui = { workspace = true, features = [
    "crossterm",
    "crossterm_0_29",
    "std",
] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync"] }

[features]
default          = []
fail-on-warnings = []

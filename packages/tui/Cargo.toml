[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Terminal user interface for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "tui"]
license     = { workspace = true }
name        = "bcode_tui"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
arboard               = { workspace = true }
bcode_agent_profile   = { workspace = true }
bcode_client          = { workspace = true }
bcode_command         = { workspace = true }
bcode_config          = { workspace = true }
bcode_ipc             = { workspace = true }
bcode_markdown_render = { workspace = true }
bcode_model           = { workspace = true }
bcode_session_models  = { workspace = true }
bcode_skill_models    = { workspace = true }
bcode_syntax_render   = { workspace = true }
bcode_worktree_models = { workspace = true }
bmux_keyboard         = { workspace = true }
bmux_terminal_grid    = { workspace = true }
bmux_text_edit        = { workspace = true }
bmux_tui              = { workspace = true, features = ["crossterm", "diff"] }
bmux_tui_components   = { workspace = true, features = ["text-input"] }
crossterm             = { workspace = true, features = ["bracketed-paste", "events"] }
image                 = { workspace = true }
png                   = { workspace = true }
serde                 = { workspace = true, features = ["derive", "std"] }
serde_json            = { workspace = true }
thiserror             = { workspace = true }
tokio                 = { workspace = true, features = ["sync", "time"] }
unicode-segmentation  = { workspace = true }
uuid                  = { workspace = true, features = ["v4"] }

[features]
default          = []
fail-on-warnings = []

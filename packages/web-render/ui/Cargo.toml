[package]
authors     = { workspace = true }
categories  = ["web-programming"]
description = "HyperChad UI components for the Bcode web renderer"
edition     = { workspace = true }
keywords    = ["bcode", "web", "renderer", "ui"]
license     = { workspace = true }
name        = "bcode_web_render_ui"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bcode_session_models = { workspace = true }
bcode_session_view_models = { workspace = true }
hyperchad = { workspace = true, features = [
    "color",
    "renderer",
    "router",
    "template",
    "transformer",
    "transformer-models",
] }
hyperchad_color = { workspace = true }
hyperchad_renderer = { workspace = true }
hyperchad_template = { workspace = true }
hyperchad_transformer = { workspace = true }
hyperchad_transformer_models = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[features]
default = []
fail-on-warnings = [
    "bcode_session_models/fail-on-warnings",
    "bcode_session_view_models/fail-on-warnings",
]

[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Configuration loading for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "config"]
license     = { workspace = true }
name        = "bcode_config"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bcode_agent_policy_models    = { workspace = true }
bcode_command                = { workspace = true }
bcode_model                  = { workspace = true }
bcode_plugin                 = { workspace = true }
bcode_skill_models           = { workspace = true }
hyperchad_docs_config        = { workspace = true }
hyperchad_docs_config_derive = { workspace = true }
serde                        = { workspace = true, features = ["derive", "std"] }
serde_json                   = { workspace = true }
thiserror                    = { workspace = true }
toml                         = { workspace = true, features = ["display"] }

[features]
default          = []
fail-on-warnings = []

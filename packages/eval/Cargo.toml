[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Eval runner, judges, reports, and comparisons for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "eval"]
license     = { workspace = true }
name        = "bcode_eval"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bcode_client         = { workspace = true }
bcode_config         = { workspace = true }
bcode_eval_models    = { workspace = true }
bcode_ipc            = { workspace = true }
bcode_session_models = { workspace = true }
bcode_tool           = { workspace = true }
regex                = { workspace = true, features = ["std"] }
serde                = { workspace = true, features = ["derive", "std"] }
serde_json           = { workspace = true }
thiserror            = { workspace = true, features = ["std"] }
tokio                = { workspace = true, features = ["rt", "time"] }
toml                 = { workspace = true, features = ["parse", "display", "serde"] }

[features]
default          = []
fail-on-warnings = []

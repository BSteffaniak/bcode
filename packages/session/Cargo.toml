[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Session lifecycle and attachment management for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "session"]
license     = { workspace = true }
name        = "bcode_session"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bcode_database_observability = { workspace = true }
bcode_metrics = { workspace = true }
bcode_plugin_sdk = { workspace = true }
bcode_session_models = { workspace = true }
bcode_skill_models = { workspace = true }
bmux_codec = { workspace = true, features = ["stable"] }
rusqlite = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
switchy = { workspace = true, features = [
    "database",
    "database-schema",
    "database-connection",
    "database-connection-turso",
    "schema",
] }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "sync"] }

[dev-dependencies]
tempfile = { workspace = true }

[features]
default          = []
fail-on-warnings = []

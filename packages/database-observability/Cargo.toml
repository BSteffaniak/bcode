[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Centralized Switchy database observability for Bcode"
edition     = { workspace = true }
keywords    = ["bcode", "database", "metrics"]
license     = { workspace = true }
name        = "bcode_database_observability"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
async-trait = { workspace = true }
bcode_metrics = { workspace = true }
switchy = { workspace = true, features = [
    "async",
    "async-sync",
    "async-tokio",
    "database",
    "database-schema",
] }
switchy_database = { workspace = true, features = ["cascade", "schema"] }

[dev-dependencies]
rusqlite = { workspace = true }
serde_json = { workspace = true }
switchy = { workspace = true, features = [
    "async",
    "async-sync",
    "async-tokio",
    "database-sqlite-rusqlite",
] }
switchy_database = { workspace = true, features = ["cascade", "schema"] }
tokio = { workspace = true, features = ["macros", "rt"] }

[features]
default          = []
fail-on-warnings = []

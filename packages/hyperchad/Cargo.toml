[package]
authors     = { workspace = true }
categories  = ["development-tools", "gui"]
description = "HyperChad application host for Bcode sessions"
edition     = { workspace = true }
keywords    = ["bcode", "hyperchad", "renderer"]
license     = { workspace = true }
name        = "bcode_hyperchad"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[lib]

[dependencies]
bcode_bundled_plugins = { workspace = true, optional = true }
bcode_client = { workspace = true }
bcode_hyperchad_ui = { workspace = true }
bcode_plugin_sdk = { workspace = true }
bcode_session_models = { workspace = true }
bcode_session_view = { workspace = true }
bcode_session_view_models = { workspace = true }
bcode_tool = { workspace = true }
hyperchad = { workspace = true, features = [
    "app",
    "color",
    "json",
    "renderer",
    "router",
    "router-form",
] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync", "time"] }
tracing = { workspace = true }

[dev-dependencies]
bcode_ipc = { workspace = true }
tokio     = { workspace = true, features = ["macros", "rt"] }

[features]
default = []
fail-on-warnings = ["bcode_hyperchad_ui/fail-on-warnings"]
renderer-html-actix = [
    "hyperchad/renderer-assets",
    "hyperchad/renderer-html-actix",
    "hyperchad/renderer-html-sse",
    "hyperchad/renderer-vanilla-js",
    "hyperchad/renderer-vanilla-js-hash",
    "hyperchad/renderer-vanilla-js-plugin-form",
    "hyperchad/renderer-vanilla-js-plugin-idiomorph",
    "hyperchad/renderer-vanilla-js-plugin-nav",
    "hyperchad/renderer-vanilla-js-plugin-routing",
    "hyperchad/renderer-vanilla-js-script",
    "hyperchad/router-static-routes",
]
static-bundled-question-plugin = [
    "dep:bcode_bundled_plugins",
    "bcode_bundled_plugins/static-bundled-question-plugin",
]

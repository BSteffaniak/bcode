[package]
authors     = { workspace = true }
categories  = ["development-tools", "gui"]
description = "Portable HyperChad UI components for Bcode sessions"
edition     = { workspace = true }
keywords    = ["bcode", "hyperchad", "renderer", "ui"]
license     = { workspace = true }
name        = "bcode_hyperchad_ui"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bcode_plugin_sdk = { workspace = true }
bcode_session_models = { workspace = true }
bcode_session_view_models = { workspace = true }
hyperchad = { workspace = true, features = [
    "actions",
    "actions-logic",
    "color",
    "markdown",
    "markdown-syntax-highlighting",
    "markdown-xss-protection",
    "renderer",
    "router",
    "template",
    "transformer",
    "transformer-models",
] }
hyperchad_color = { workspace = true }
hyperchad_renderer = { workspace = true }
hyperchad_template = { workspace = true }
hyperchad_transformer = { workspace = true }
hyperchad_transformer_models = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[features]
default = []
fail-on-warnings = [
    "bcode_session_models/fail-on-warnings",
    "bcode_session_view_models/fail-on-warnings",
]

[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Programmatic client API for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "client"]
license     = { workspace = true }
name        = "bcode_client"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bcode_agent_profile    = { workspace = true }
bcode_command          = { workspace = true }
bcode_config           = { workspace = true }
bcode_daemon_lifecycle = { workspace = true }
bcode_ipc              = { workspace = true }
bcode_metrics          = { workspace = true }
bcode_model            = { workspace = true }
bcode_plugin_sdk       = { workspace = true }
bcode_provider_auth    = { workspace = true }
bcode_session_models   = { workspace = true }
bcode_skill_models     = { workspace = true }
bcode_tool             = { workspace = true }
serde_json             = { workspace = true }
sshenv_vault           = { workspace = true }
thiserror              = { workspace = true }
tokio                  = { workspace = true, features = ["time"] }

[target.'cfg(target_os = "linux")'.dependencies]
sshenv_vault = { workspace = true, features = [
    "linux-secret-service",
    "tpm-device-seal",
] }

[target.'cfg(target_os = "macos")'.dependencies]
sshenv_vault = { workspace = true, features = ["macos-keychain"] }

[target.'cfg(target_os = "windows")'.dependencies]
sshenv_vault = { workspace = true, features = ["windows-dpapi"] }

[target.'cfg(not(any(target_os = "linux", target_os = "macos", target_os = "windows")))'.dependencies]
sshenv_vault = { workspace = true }

[features]
default          = []
fail-on-warnings = []

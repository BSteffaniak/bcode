[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Daemon lifecycle registry and cleanup models for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "daemon", "lifecycle"]
license     = { workspace = true }
name        = "bcode_daemon_lifecycle"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bcode_config     = { workspace = true }
bcode_ipc        = { workspace = true }
bcode_plugin_sdk = { workspace = true }
serde            = { workspace = true, features = ["derive", "std"] }
serde_json       = { workspace = true }
thiserror        = { workspace = true }
tokio            = { workspace = true, features = ["process", "time"] }

[features]
default          = []
fail-on-warnings = []

[package]
authors     = { workspace = true }
categories  = ["computer-vision", "text-processing"]
description = "Safe, minimal Tesseract OCR wrapper for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "ocr", "tesseract"]
license     = { workspace = true }
name        = "bcode_tesseract_ocr"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bcode_tesseract_sys = { workspace = true, default-features = false }
libloading          = { workspace = true, features = ["std"] }
thiserror           = { workspace = true }
toml                = { workspace = true }

[features]
bundled-tesseract         = ["bundled-tesseract-default"]
bundled-tesseract-default = ["bundled-tesseract-v5-5-1"]
bundled-tesseract-latest  = ["bundled-tesseract-v5-5-1"]
bundled-tesseract-v5-3-4  = ["bcode_tesseract_sys/bundled-tesseract-v5-3-4"]
bundled-tesseract-v5-5-1  = ["bcode_tesseract_sys/bundled-tesseract-v5-5-1"]
default                   = []
fail-on-warnings          = ["bcode_tesseract_sys/fail-on-warnings"]
system-tesseract          = ["bcode_tesseract_sys/system-tesseract"]

[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Local bcode daemon runtime"
edition     = { workspace = true }
keywords    = ["bcode", "server", "daemon"]
license     = { workspace = true }
name        = "bcode_server"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bcode_agent_profile = { workspace = true }
bcode_command = { workspace = true }
bcode_config = { workspace = true }
bcode_ipc = { workspace = true }
bcode_model = { workspace = true }
bcode_plugin = { workspace = true }
bcode_session = { workspace = true }
bcode_session_models = { workspace = true }
bcode_tool = { workspace = true }
serde = { workspace = true, features = ["derive", "std"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = [
    "io-util",
    "macros",
    "net",
    "rt",
    "sync",
    "time",
] }
tracing = { workspace = true }

[features]
default          = []
fail-on-warnings = []

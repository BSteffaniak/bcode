[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Local bcode daemon runtime"
edition     = { workspace = true }
keywords    = ["bcode", "server", "daemon"]
license     = { workspace = true }
name        = "bcode_server"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
base64 = { workspace = true }
bcode_agent_profile = { workspace = true }
bcode_agent_runtime = { workspace = true }
bcode_bundled_plugins = { workspace = true }
bcode_command = { workspace = true }
bcode_config = { workspace = true }
bcode_daemon_lifecycle = { workspace = true }
bcode_ipc = { workspace = true }
bcode_metrics = { workspace = true }
bcode_model = { workspace = true }
bcode_model_catalog = { workspace = true }
bcode_model_catalog_models = { workspace = true }
bcode_plugin = { workspace = true }
bcode_plugin_sdk = { workspace = true }
bcode_provider_auth = { workspace = true }
bcode_ralph = { workspace = true }
bcode_session = { workspace = true }
bcode_session_import = { workspace = true }
bcode_session_models = { workspace = true }
bcode_settings = { workspace = true }
bcode_skill = { workspace = true }
bcode_skill_models = { workspace = true }
bcode_tool = { workspace = true }
bcode_workflow = { workspace = true }
bcode_worktree = { workspace = true }
bcode_worktree_models = { workspace = true }
futures = { workspace = true }
serde = { workspace = true, features = ["derive", "std"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = [
    "io-util",
    "macros",
    "net",
    "rt",
    "sync",
    "time",
] }
toml = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
bcode_bundled_plugins = { workspace = true, features = [
    "static-bundled-question-plugin",
] }
bcode_client = { workspace = true }
bcode_fake_provider_plugin = { workspace = true, features = ["static-bundled"] }
bcode_filesystem_plugin = { workspace = true, features = ["static-bundled"] }
bcode_hyperchad = { workspace = true, features = [
    "renderer-html-actix",
    "static-bundled-question-plugin",
] }
bcode_question_plugin = { workspace = true, features = ["static-bundled"] }
bcode_session_view = { workspace = true }
bcode_session_view_models = { workspace = true }
bcode_shell_plugin = { workspace = true, features = ["static-bundled"] }
bcode_vim_edit_plugin = { workspace = true, features = ["static-bundled"] }
bcode_web_search_plugin = { workspace = true, features = ["static-bundled"] }
hyperchad = { workspace = true, features = ["router", "router-form"] }
png = { workspace = true }
switchy = { workspace = true, features = ["database", "database-schema"] }
tempfile = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
sshenv_vault = { workspace = true, features = [
    "linux-secret-service",
    "tpm-device-seal",
] }

[target.'cfg(target_os = "macos")'.dependencies]
sshenv_vault = { workspace = true, features = ["macos-keychain"] }

[target.'cfg(target_os = "windows")'.dependencies]
sshenv_vault = { workspace = true, features = ["windows-dpapi"] }

[target.'cfg(not(any(target_os = "linux", target_os = "macos", target_os = "windows")))'.dependencies]
sshenv_vault = { workspace = true }

[features]
default          = []
fail-on-warnings = []

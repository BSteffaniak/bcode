[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Command-line interface for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "cli"]
license     = { workspace = true }
name        = "bcode_cli"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
base64                       = { workspace = true }
bcode_client                 = { workspace = true }
bcode_code_review_models     = { workspace = true }
bcode_config                 = { workspace = true }
bcode_daemon_lifecycle       = { workspace = true }
bcode_ipc                    = { workspace = true }
bcode_metrics                = { workspace = true }
bcode_model                  = { workspace = true }
bcode_model_provider_runtime = { workspace = true }
bcode_plugin                 = { workspace = true }
bcode_provider_auth          = { workspace = true }
bcode_server                 = { workspace = true }
bcode_session                = { workspace = true }
bcode_session_import         = { workspace = true }
bcode_session_models         = { workspace = true }
bcode_settings               = { workspace = true }
bcode_tui                    = { workspace = true }
bcode_worktree_models        = { workspace = true }
bmux_keyboard                = { workspace = true }
bmux_tui                     = { workspace = true, features = ["crossterm"] }
clap                         = { workspace = true, features = ["derive", "help", "std", "usage"] }
crossterm                    = { workspace = true, features = ["events"] }
rand                         = { workspace = true }
reqwest                      = { workspace = true }
rpassword                    = { workspace = true }
serde                        = { workspace = true, features = ["derive"] }
serde_json                   = { workspace = true }
sha2                         = { workspace = true }
sshenv_vault                 = { workspace = true }
thiserror                    = { workspace = true }
tokio                        = { workspace = true, features = ["signal", "time"] }
tracing-subscriber           = { workspace = true }
zeroize                      = { workspace = true }

[features]
_static-bundled = []
default = ["static-bundled-plugins"]
fail-on-warnings = []
static-bundled-bedrock-provider-plugin = [
    "_static-bundled",
    "bcode_server/static-bundled-bedrock-provider-plugin",
]
static-bundled-blims-plugin = [
    "_static-bundled",
    "bcode_server/static-bundled-blims-plugin",
]
static-bundled-code-review-plugin = [
    "_static-bundled",
    "bcode_server/static-bundled-code-review-plugin",
    "bcode_tui/static-bundled-code-review-plugin",
]
static-bundled-default-agents-plugin = [
    "_static-bundled",
    "bcode_server/static-bundled-default-agents-plugin",
]
static-bundled-document-plugin = [
    "_static-bundled",
    "bcode_server/static-bundled-document-plugin",
]
static-bundled-fake-provider-plugin = [
    "_static-bundled",
    "bcode_server/static-bundled-fake-provider-plugin",
]
static-bundled-filesystem-plugin = [
    "_static-bundled",
    "bcode_server/static-bundled-filesystem-plugin",
]
static-bundled-git-plugin = [
    "_static-bundled",
    "bcode_server/static-bundled-git-plugin",
]
static-bundled-github-review-publisher-plugin = [
    "_static-bundled",
    "bcode_server/static-bundled-github-review-publisher-plugin",
]
static-bundled-openai-compatible-provider-plugin = [
    "_static-bundled",
    "bcode_server/static-bundled-openai-compatible-provider-plugin",
]
static-bundled-opencode-session-import-plugin = [
    "_static-bundled",
    "bcode_server/static-bundled-opencode-session-import-plugin",
]
static-bundled-pi-session-import-plugin = [
    "_static-bundled",
    "bcode_server/static-bundled-pi-session-import-plugin",
]
static-bundled-plugins = [
    "_static-bundled",
    "static-bundled-bedrock-provider-plugin",
    "static-bundled-blims-plugin",
    "static-bundled-code-review-plugin",
    "static-bundled-default-agents-plugin",
    "static-bundled-document-plugin",
    "static-bundled-fake-provider-plugin",
    "static-bundled-filesystem-plugin",
    "static-bundled-git-plugin",
    "static-bundled-github-review-publisher-plugin",
    "static-bundled-openai-compatible-provider-plugin",
    "static-bundled-opencode-session-import-plugin",
    "static-bundled-pi-session-import-plugin",
    "static-bundled-ralph-plugin",
    "static-bundled-shell-plugin",
    "static-bundled-web-search-plugin",
    "static-bundled-worktree-plugin",
]
static-bundled-ralph-plugin = [
    "_static-bundled",
    "bcode_tui/static-bundled-ralph-plugin",
]
static-bundled-shell-plugin = [
    "_static-bundled",
    "bcode_server/static-bundled-shell-plugin",
]
static-bundled-web-search-plugin = [
    "_static-bundled",
    "bcode_server/static-bundled-web-search-plugin",
]
static-bundled-worktree-plugin = [
    "_static-bundled",
    "bcode_server/static-bundled-worktree-plugin",
]

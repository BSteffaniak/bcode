[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Command-line interface for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "cli"]
license     = { workspace = true }
name        = "bcode_cli"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
base64 = { workspace = true }
bcode_client = { workspace = true }
bcode_config = { workspace = true }
bcode_daemon_lifecycle = { workspace = true }
bcode_ipc = { workspace = true }
bcode_metrics = { workspace = true }
bcode_model = { workspace = true }
bcode_model_provider_runtime = { workspace = true }
bcode_plugin = { workspace = true }
bcode_plugin_sdk = { workspace = true }
bcode_provider_auth = { workspace = true }
bcode_server = { workspace = true }
bcode_session = { workspace = true }
bcode_session_import = { workspace = true }
bcode_session_models = { workspace = true }
bcode_settings = { workspace = true }
bcode_tui = { workspace = true }
bcode_web_render = { workspace = true, features = [
    "actix",
    "assets",
    "html",
    "static-routes",
] }
bcode_worktree_models = { workspace = true }
bmux_keyboard = { workspace = true }
bmux_tui = { workspace = true, features = ["crossterm"] }
clap = { workspace = true, features = ["derive", "help", "std", "usage"] }
crossterm = { workspace = true, features = ["events"] }
rand = { workspace = true }
reqwest = { workspace = true }
rpassword = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["signal", "time"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
zeroize = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
sshenv_vault = { workspace = true, features = [
    "linux-secret-service",
    "tpm-device-seal",
] }

[target.'cfg(target_os = "macos")'.dependencies]
sshenv_vault = { workspace = true, features = ["macos-keychain"] }

[target.'cfg(target_os = "windows")'.dependencies]
sshenv_vault = { workspace = true, features = ["windows-dpapi"] }

[target.'cfg(not(any(target_os = "linux", target_os = "macos", target_os = "windows")))'.dependencies]
sshenv_vault = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[features]
_static-bundled = []
default = []
fail-on-warnings = []
static-bundled-bedrock-provider-plugin = ["_static-bundled"]
static-bundled-blims-plugin = ["_static-bundled"]
static-bundled-code-review-plugin = [
    "_static-bundled",
    "bcode_tui/static-bundled-code-review-plugin",
]
static-bundled-default-agents-plugin = ["_static-bundled"]
static-bundled-document-plugin = ["_static-bundled"]
static-bundled-fake-provider-plugin = ["_static-bundled"]
static-bundled-filesystem-plugin = [
    "_static-bundled",
    "bcode_tui/static-bundled-filesystem-plugin",
]
static-bundled-git-plugin = ["_static-bundled"]
static-bundled-github-review-publisher-plugin = ["_static-bundled"]
static-bundled-openai-compatible-provider-plugin = ["_static-bundled"]
static-bundled-opencode-session-import-plugin = ["_static-bundled"]
static-bundled-pi-session-import-plugin = ["_static-bundled"]
static-bundled-plugins = [
    "_static-bundled",
    "static-bundled-bedrock-provider-plugin",
    "static-bundled-blims-plugin",
    "static-bundled-code-review-plugin",
    "static-bundled-default-agents-plugin",
    "static-bundled-document-plugin",
    "static-bundled-fake-provider-plugin",
    "static-bundled-filesystem-plugin",
    "static-bundled-git-plugin",
    "static-bundled-github-review-publisher-plugin",
    "static-bundled-openai-compatible-provider-plugin",
    "static-bundled-opencode-session-import-plugin",
    "static-bundled-pi-session-import-plugin",
    "static-bundled-question-plugin",
    "static-bundled-ralph-plugin",
    "static-bundled-shell-plugin",
    "static-bundled-web-search-plugin",
    "static-bundled-worktree-plugin",
    "bcode_tui/static-bundled-plugins",
]
static-bundled-question-plugin = [
    "_static-bundled",
    "bcode_web_render/static-bundled-question-plugin",
]
static-bundled-ralph-plugin = [
    "_static-bundled",
    "bcode_tui/static-bundled-ralph-plugin",
]
static-bundled-shell-plugin = ["_static-bundled"]
static-bundled-web-search-plugin = ["_static-bundled"]
static-bundled-worktree-plugin = ["_static-bundled"]

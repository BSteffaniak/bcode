[package]
authors     = { workspace = true }
categories  = ["command-line-interface", "development-tools"]
description = "Reusable terminal UI components for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "terminal", "tui", "components"]
license     = { workspace = true }
name        = "bcode_tui_components"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bcode_syntax_render  = { workspace = true, optional = true }
bmux_terminal_grid   = { workspace = true }
bmux_tui             = { workspace = true }
bmux_tui_components  = { workspace = true }
unicode-segmentation = { workspace = true }
unicode-width        = { workspace = true }

[features]
default          = []
fail-on-warnings = []
syntax           = ["dep:bcode_syntax_render"]

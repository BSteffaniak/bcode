[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Umbrella binary for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "coding-agent"]
license     = { workspace = true }
name        = "bcode"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[[bin]]
name = "bcode"
path = "src/main.rs"

[dependencies]
bcode_agent_runtime   = { workspace = true }
bcode_bundled_plugins = { workspace = true }
bcode_cli             = { workspace = true }
bcode_model           = { workspace = true }
thiserror             = { workspace = true }
tokio                 = { workspace = true, features = ["macros", "rt-multi-thread", "sync"] }

[features]
bundled-ocr-tesseract = ["bundled-ocr-tesseract-default"]
bundled-ocr-tesseract-all = [
    "bundled-ocr-tesseract-v5-3-4",
    "bundled-ocr-tesseract-v5-5-1",
    "bundled-ocr-tesseract-v5-5-2",
]
bundled-ocr-tesseract-default = ["bundled-ocr-tesseract-v5-5-2"]
bundled-ocr-tesseract-latest = ["bundled-ocr-tesseract-v5-5-2"]
bundled-ocr-tesseract-v5-3-4 = [
    "static-bundled-ocr-plugin",
    "bcode_bundled_plugins/bundled-ocr-tesseract-v5-3-4",
]
bundled-ocr-tesseract-v5-5-1 = [
    "static-bundled-ocr-plugin",
    "bcode_bundled_plugins/bundled-ocr-tesseract-v5-5-1",
]
bundled-ocr-tesseract-v5-5-2 = [
    "static-bundled-ocr-plugin",
    "bcode_bundled_plugins/bundled-ocr-tesseract-v5-5-2",
]
default = ["static-bundled-plugins", "bundled-ocr-tesseract"]
fail-on-warnings = []
static-bundled-bedrock-provider-plugin = [
    "bcode_bundled_plugins/static-bundled-bedrock-provider-plugin",
]
static-bundled-blims-plugin = [
    "bcode_bundled_plugins/static-bundled-blims-plugin",
]
static-bundled-code-review-plugin = [
    "bcode_bundled_plugins/static-bundled-code-review-plugin",
    "bcode_cli/static-bundled-code-review-plugin",
]
static-bundled-default-agents-plugin = [
    "bcode_bundled_plugins/static-bundled-default-agents-plugin",
]
static-bundled-document-plugin = [
    "bcode_bundled_plugins/static-bundled-document-plugin",
]
static-bundled-eval-plugin = [
    "bcode_bundled_plugins/static-bundled-eval-plugin",
]
static-bundled-fake-provider-plugin = [
    "bcode_bundled_plugins/static-bundled-fake-provider-plugin",
]
static-bundled-filesystem-plugin = [
    "bcode_bundled_plugins/static-bundled-filesystem-plugin",
    "bcode_cli/static-bundled-filesystem-plugin",
]
static-bundled-git-plugin = ["bcode_bundled_plugins/static-bundled-git-plugin"]
static-bundled-github-review-publisher-plugin = [
    "bcode_bundled_plugins/static-bundled-github-review-publisher-plugin",
]
static-bundled-model-plugin = [
    "bcode_bundled_plugins/static-bundled-model-plugin",
]
static-bundled-ocr-plugin = ["bcode_bundled_plugins/static-bundled-ocr-plugin"]
static-bundled-openai-compatible-provider-plugin = [
    "bcode_bundled_plugins/static-bundled-openai-compatible-provider-plugin",
]
static-bundled-opencode-session-import-plugin = [
    "bcode_bundled_plugins/static-bundled-opencode-session-import-plugin",
]
static-bundled-pi-session-import-plugin = [
    "bcode_bundled_plugins/static-bundled-pi-session-import-plugin",
]
static-bundled-plugins = [
    "bcode_bundled_plugins/static-bundled-plugins",
    "bcode_cli/static-bundled-plugins",
]
static-bundled-question-plugin = [
    "bcode_bundled_plugins/static-bundled-question-plugin",
    "bcode_cli/static-bundled-question-plugin",
]
static-bundled-ralph-plugin = [
    "bcode_bundled_plugins/static-bundled-ralph-plugin",
    "bcode_cli/static-bundled-ralph-plugin",
]
static-bundled-shell-plugin = [
    "bcode_bundled_plugins/static-bundled-shell-plugin",
    "bcode_cli/static-bundled-shell-plugin",
]
static-bundled-skills-plugin = [
    "bcode_bundled_plugins/static-bundled-skills-plugin",
]
static-bundled-web-search-plugin = [
    "bcode_bundled_plugins/static-bundled-web-search-plugin",
]
static-bundled-worktree-plugin = [
    "bcode_bundled_plugins/static-bundled-worktree-plugin",
]
system-ocr-tesseract = [
    "static-bundled-ocr-plugin",
    "bcode_bundled_plugins/system-ocr-tesseract",
]

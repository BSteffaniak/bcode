[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Umbrella binary for bcode"
edition     = { workspace = true }
keywords    = ["bcode", "coding-agent"]
license     = { workspace = true }
name        = "bcode"
readme      = { workspace = true }
repository  = { workspace = true }
version     = { workspace = true }

[[bin]]
name = "bcode"
path = "src/main.rs"

[dependencies]
bcode_cli = { workspace = true }
tokio     = { workspace = true, features = ["macros", "rt-multi-thread"] }

[features]
_static-bundled = []
default = ["static-bundled-plugins"]
fail-on-warnings = []
static-bundled-bedrock-provider-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-bedrock-provider-plugin",
]
static-bundled-blims-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-blims-plugin",
]
static-bundled-code-review-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-code-review-plugin",
]
static-bundled-default-agents-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-default-agents-plugin",
]
static-bundled-document-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-document-plugin",
]
static-bundled-fake-provider-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-fake-provider-plugin",
]
static-bundled-filesystem-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-filesystem-plugin",
]
static-bundled-git-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-git-plugin",
]
static-bundled-github-review-publisher-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-github-review-publisher-plugin",
]
static-bundled-openai-compatible-provider-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-openai-compatible-provider-plugin",
]
static-bundled-opencode-session-import-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-opencode-session-import-plugin",
]
static-bundled-pi-session-import-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-pi-session-import-plugin",
]
static-bundled-plugins = [
    "_static-bundled",
    "static-bundled-bedrock-provider-plugin",
    "static-bundled-blims-plugin",
    "static-bundled-code-review-plugin",
    "static-bundled-default-agents-plugin",
    "static-bundled-document-plugin",
    "static-bundled-fake-provider-plugin",
    "static-bundled-filesystem-plugin",
    "static-bundled-git-plugin",
    "static-bundled-github-review-publisher-plugin",
    "static-bundled-openai-compatible-provider-plugin",
    "static-bundled-opencode-session-import-plugin",
    "static-bundled-pi-session-import-plugin",
    "static-bundled-ralph-plugin",
    "static-bundled-shell-plugin",
    "static-bundled-web-search-plugin",
    "static-bundled-worktree-plugin",
]
static-bundled-ralph-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-ralph-plugin",
]
static-bundled-shell-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-shell-plugin",
]
static-bundled-web-search-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-web-search-plugin",
]
static-bundled-worktree-plugin = [
    "_static-bundled",
    "bcode_cli/static-bundled-worktree-plugin",
]
